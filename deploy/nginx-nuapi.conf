# Nginx reverse proxy for the jitu-nath API.
# Copy to: /etc/nginx/sites-available/nuapi.zamansheikh.com
# Then:    ln -s /etc/nginx/sites-available/nuapi.zamansheikh.com /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
#          certbot --nginx -d nuapi.zamansheikh.com   (adds the HTTPS block automatically)

server {
    listen 80;
    listen [::]:80;
    server_name nuapi.zamansheikh.com;

    # Certbot will inject the SSL config and a redirect to 443 here.

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
